name: Deploy backend (main)

# Build the image on push to main, push it to GHCR, then deploy to the Hetzner
# VPS. The `deploy` job targets the `production` GitHub Environment — add a
# required-reviewer protection rule there to make the deploy step a one-click
# manual approval (see be/deploy/DEPLOY.md § CI/CD).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/rishi-optiminastic/signalor-be

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: meta
        run: echo "tag=sha-$(echo '${{ github.sha }}' | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.meta.outputs.tag }}
          # Persistent layer cache across runs — the Chromium/apt layers are
          # the slow part and rarely change.
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Manual approval gate: configure required reviewers on this Environment.
    environment: production
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          APP_TAG: ${{ needs.build.outputs.tag }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: APP_TAG,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            cd /opt/signalor/be/deploy
            # Authenticate to GHCR with the workflow's ephemeral token (valid for
            # this run only) so the box can pull the private image.
            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin
            # Pin compose to the exact commit we just built.
            echo "APP_TAG=$APP_TAG" > .env
            docker compose pull web worker
            docker compose up -d
            docker image prune -f
            docker logout ghcr.io
